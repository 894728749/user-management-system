<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="brand">用户管理系统</a>
        </div>
        <div class="nav-right">
            {% if session.get("username") %}
            <span class="nav-welcome">欢迎，{{ session["username"] }}</span>
            <a href="/upload" class="nav-link">上传头像</a>
            <a href="/profile" class="nav-link">个人中心</a>
            {% if session.get("username") %}
            <form method="POST" action="/logout" style="display:inline;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="nav-link" style="background:none;border:none;cursor:pointer;">退出</button>
            </form>
            {% endif %}
            {% else %}
            <a href="/login" class="nav-link">登录</a>
            <a href="/register" class="nav-link">注册</a>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
