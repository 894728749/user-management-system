name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Generate test SSL cert
        run: |
          openssl req -x509 -newkey rsa:2048 -keyout ssl.key -out ssl.crt \
            -days 365 -nodes -subj "/CN=localhost"
      - name: Run tests
        run: python -m pytest tests/test_business_logic.py -v
        env:
          SECRET_KEY: "ci-secret-key-32chr-long-for-testing!!!!"
          ADMIN_PASSWORD: "testAdmin@2026"
          ALICE_PASSWORD: "testAlice@2026"
